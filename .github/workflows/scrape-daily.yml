name: Daily event scrape

on:
  schedule:
    # 10:00 UTC = 4 AM Mountain (DST) / 3 AM Mountain (standard)
    - cron: "37 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    name: Run all city scrapers
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      ENABLE_DETAIL_ENRICH: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Restore enrichment cache
        uses: actions/cache@v4
        with:
          path: .cache
          # Unique key each run so the updated cache is always saved; restore-keys
          # falls back to the most recent previous cache. This makes the costly
          # Firecrawl/LLM enrichment a one-time fill instead of a daily re-fetch.
          key: enrich-cache-${{ github.run_id }}
          restore-keys: |
            enrich-cache-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          python -m playwright install --with-deps chromium

      - name: Scrape Park City events
        id: scrape_pc
        continue-on-error: true
        run: |
          echo "::group::Park City scraper"
          python scraper.py
          echo "::endgroup::"

          echo "::group::Egyptian Theatre scraper"
          python -u egyptian_scraper.py
          echo "::endgroup::"

          echo "::group::Park City Film scraper"
          python -u parkcityfilm_scraper.py
          echo "::endgroup::"

      - name: Scrape Heber Valley events
        id: scrape_heber
        continue-on-error: true
        run: |
          echo "::group::Heber Valley scraper"
          python heber_scraper.py
          echo "::endgroup::"

      - name: Scrape Elkhart Lake events
        id: scrape_elkhart
        continue-on-error: true
        run: |
          echo "::group::Elkhart Lake scraper"
          python elkhart_scraper.py
          echo "::endgroup::"

      - name: Scrape Green Lake events
        id: scrape_greenlake
        continue-on-error: true
        run: |
          echo "::group::Green Lake scraper (universal, push mode)"
          STAGE_MODE=push python -u generic_city_scraper.py --city "green lake wisconsin" --lat 43.8408 --lng -88.9576 --radius 25
          echo "::endgroup::"

      - name: Scrape Jackson Hole events
        id: scrape_jackson
        continue-on-error: true
        run: |
          echo "::group::Jackson Hole scraper"
          echo "FIRECRAWL_API_KEY length: ${#FIRECRAWL_API_KEY}"
          echo "ANTHROPIC_API_KEY length: ${#ANTHROPIC_API_KEY}"
          python -u jackson_scraper.py
          echo "::endgroup::"

      - name: Incremental store update (cut-over sources)
        run: |
          echo "::group::Incremental store update"
          python incremental_cron.py
          echo "::endgroup::"

      - name: Apply event overrides
        id: overrides
        continue-on-error: true
        run: |
          echo "::group::Event overrides"
          python event_overrides.py
          echo "::endgroup::"

      - name: Auto-repair quality issues
        id: auto_repair
        continue-on-error: true
        run: |
          echo "::group::Event auto-repair"
          python event_auto_repair.py
          echo "::endgroup::"

      - name: Run quality audit
        id: audit
        continue-on-error: true
        run: |
          echo "::group::Event quality audit"
          python event_quality_audit.py
          echo "::endgroup::"

      - name: LLM resolve ambiguous issues
        id: llm_resolve
        continue-on-error: true
        run: |
          echo "::group::LLM resolver"
          python event_llm_resolve.py
          echo "::endgroup::"

      - name: Re-run quality audit after LLM resolve
        id: audit_after_llm
        continue-on-error: true
        run: |
          echo "::group::Quality audit (post-LLM)"
          python event_quality_audit.py
          echo "::endgroup::"

      - name: Scraper health check
        id: health_check
        continue-on-error: true
        run: |
          echo "::group::Scraper health"
          python scraper_health.py
          echo "::endgroup::"

      - name: Build master file + per-city views
        id: build_master
        continue-on-error: true
        run: |
          echo "::group::Building master file + radius-filtered city views"
          python build_master_and_views.py
          echo "::endgroup::"

      - name: Re-run quality audit on final built data
        id: audit_final
        continue-on-error: true
        run: |
          echo "::group::Quality audit (post-build, final)"
          python event_quality_audit.py
          echo "::endgroup::"

      - name: Data-quality standing guard (C1-C8)
        id: dq_audit
        continue-on-error: true
        run: |
          echo "::group::Data-quality standing guard (C1-C8)"
          # Scans built per-city views for the bug classes we've hit (recurring
          # drops, multiday gaps, venue-time collisions, bad dates, cross-source
          # dups, coverage cliffs, encoding artifacts, ongoing-event drops).
          # Writes findings JSON for the digest. continue-on-error so a HIGH
          # finding surfaces WITHOUT blocking the daily data commit.
          python data_quality_audit.py --json data_quality_findings.json || true
          echo "::endgroup::"

      - name: LLM scraper health check
        id: llm_health_check
        continue-on-error: true
        run: |
          echo "::group::LLM scraper health check"
          python -u scraper_llm_health.py
          echo "::endgroup::"

      - name: Send daily digest email
        id: digest_email
        run: |
          echo "::group::Email digest"
          python -u audit_email_digest.py
          echo "RESEND_API_KEY length: ${#RESEND_API_KEY}"
          echo "::endgroup::"

      - name: Build run summary
        run: |
          PC="${{ steps.scrape_pc.outcome }}"
          HEBER="${{ steps.scrape_heber.outcome }}"
          ELKHART="${{ steps.scrape_elkhart.outcome }}"
          JACKSON="${{ steps.scrape_jackson.outcome }}"
          GREENLAKE="${{ steps.scrape_greenlake.outcome }}"
          REPAIR="${{ steps.auto_repair.outcome }}"
          AUDIT="${{ steps.audit.outcome }}"

          {
            echo "## 🗓️ Daily scrape summary"
            echo ""
            echo "| City | Status |"
            echo "| --- | --- |"
            echo "| Park City | ${PC} |"
            echo "| Heber Valley | ${HEBER} |"
            echo "| Elkhart Lake | ${ELKHART} |"
            echo "| Jackson Hole | ${JACKSON} |"
            echo "| Green Lake | ${GREENLAKE} |"
            echo "| Auto-repair | ${REPAIR} |"
            echo "| Quality audit | ${AUDIT} |"
            echo ""
            if [ -f audit_issues.json ]; then
              echo "### Quality audit summary"
              python audit_summary_for_github.py
              echo ""
            fi
            if [ -f public/events.json ]; then
              echo "- Park City events in JSON: $(python -c "import json; d=json.load(open('public/events.json')); print(len(d.get('events', d) if isinstance(d, dict) else d))")"
            fi
            if [ -f public/events-heber.json ]; then
              echo "- Heber events in JSON: $(python -c "import json; d=json.load(open('public/events-heber.json')); print(len(d.get('events', d) if isinstance(d, dict) else d))")"
            fi
            if [ -f public/events-elkhartlake.json ]; then
              echo "- Elkhart Lake events in JSON: $(python -c "import json; d=json.load(open('public/events-elkhartlake.json')); print(len(d.get('events', d) if isinstance(d, dict) else d))")"
            fi
            if [ -f public/events-jackson.json ]; then
              echo "- Jackson Hole events in JSON: $(python -c "import json; d=json.load(open('public/events-jackson.json')); print(len(d.get('events', d) if isinstance(d, dict) else d))")"
            fi
            if [ -f public/events-greenlake.json ]; then
              echo "- Green Lake events in JSON: $(python -c "import json; d=json.load(open('public/events-greenlake.json')); print(len(d.get('events', d) if isinstance(d, dict) else d))")"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$PC" = "failure" ] && [ "$HEBER" = "failure" ] && [ "$ELKHART" = "failure" ]; then
            echo "::error::All three scrapers failed — check logs above"
            exit 1
          fi

      - name: Check for changes
        id: changes
        run: |
          # Stage everything the run produced (gitignore excludes caches/
          # bytecode). Robust: avoids leaving run-written tracked files (e.g.
          # scraper_llm_health.json) unstaged, which breaks the later rebase.
          git add -A
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git diff --cached --stat
          fi

      - name: Commit and push updated JSON
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "yoocal-bot"
          git config user.email "actions@github.com"
          TODAY=$(TZ='America/Denver' date '+%Y-%m-%d')
          git commit -m "chore(data): daily scrape ${TODAY}" \
                     -m "Automated nightly scrape via GitHub Actions."
          # Rebase onto latest main, but the freshly-scraped data files are
          # authoritative — auto-resolve any data-file conflict in favor of THIS
          # run's data (-X theirs during rebase = incoming/our-replayed commit).
          # Retry a few times in case manual pushes land during the run.
          for attempt in 1 2 3; do
            git fetch origin main
            if git rebase -X theirs origin/main; then
              if git push; then
                echo "Pushed on attempt ${attempt}"
                exit 0
              fi
            else
              echo "Rebase failed on attempt ${attempt}, aborting rebase"
              git rebase --abort || true
            fi
            sleep 5
          done
          echo "::error::Could not push after 3 attempts — manual intervention needed"
          exit 1

      - name: No changes to commit
        if: steps.changes.outputs.has_changes == 'false'
        run: echo "No JSON changes from this run. Nothing to commit."

      - name: Data-quality GATE (fail run on real-bug HIGHs)
        if: always()
        run: |
          echo "::group::Data-quality gate (C1/C2/C5/C7)"
          # Runs AFTER the data commit so a failure alerts (red run) without
          # blocking the data from shipping. Fails ONLY on gateable HIGH findings
          # (real data bugs). C6 coverage-cliff is surfaced earlier but does NOT
          # gate (transient CI throttles handled by the resilience guard).
          python data_quality_audit.py --gate
          echo "::endgroup::"
